<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <title>Rating</title>
</head>

<body>
  <section class="rating">
    <div class="container">
      <h2 class="rating__title">Ratings</h2>
      <div class="rating__content">
        <div class="rating__left">
          <div class="pacss__top">
            <div class="pacss__wrapper" data-pct="4.5">
                <svg class="pacss__svg" width="200" height="200" viewPort="0 0 100 100" version="1.1"
                xmlns="http://www.w3.org/2000/svg">
                <circle r="90" cx="100" cy="100" fill="transparent" stroke-dasharray="565.48" stroke-dashoffset="0">
                </circle>
                <circle class="pacss__bar" r="90" cx="100" cy="100" fill="transparent" stroke-dasharray="565.48"
                  stroke-dashoffset="0"></circle>
              </svg>
            </div>
            <div class="pacss-excellent">
              <p>excellent</p>
              <span>1034 reviews</span>
            </div>
          </div>
          <div class="pacss__bottom">
            <div class="pacss__item">
              <div class="pacss__item-rating">4.5/5</div>
              <p class="pacss__item-info">Food</p>
            </div>
            <div class="pacss__item">
              <div class="pacss__item-rating">4.5/5</div>
              <p class="pacss__item-info">Service</p>
            </div>
            <div class="pacss__item">
              <div class="pacss__item-rating">4.9/5</div>
              <p class="pacss__item-info">Ambience</p>
            </div>

          </div>
        </div>
        <div class="rating__right">
          <div class="rating__line">
            <div class="rating__bar">
              <div class="bar__container">
                <div class="bar__container-5 bar--root"></div>
              </div>
            </div>
            <div class="rating__side">
              <div>5</div>
            </div>
          </div>
          <div class="rating__line">
            <div class="rating__bar">
              <div class="bar__container">
                <div class="bar__container-4 bar--root"></div>
              </div>
            </div>
            <div class="rating__side">
              <div>4</div>
            </div>
          </div>
          <div class="rating__line">
            <div class="rating__bar">
              <div class="bar__container">
                <div class="bar__container-3 bar--root"></div>
              </div>
            </div>
            <div class="rating__side">
              <div>3</div>
            </div>
          </div>
          <div class="rating__line">
            <div class="rating__bar">
              <div class="bar__container">
                <div class="bar__container-2 bar--root"></div>
              </div>
            </div>
            <div class="rating__side">
              <div>2</div>
            </div>
          </div>
          <div class="rating__line">
            <div class="rating__bar">
              <div class="bar__container">
                <div class="bar__container-1 bar--root"></div>
              </div>
            </div>
            <div class="rating__side">
              <div>1</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>

</html>
